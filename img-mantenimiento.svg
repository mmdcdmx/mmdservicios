  <ellipse cx="560" cy="182" rx="32" ry="14" fill="#FFD700"/>
  <rect x="528" y="182" width="64" height="8" rx="4" fill="#E6B800"/>
  <!-- Gafete MMD -->
  <rect x="538" y="238" width="34" height="22" rx="4" fill="#fff"/>
  <rect x="541" y="241" width="28" height="6" rx="2" fill="#185FA5"/>
  <rect x="541" y="250" width="20" height="4" rx="2" fill="#9FE1CB"/>
  <!-- Brazos técnico -->
  <rect x="480" y="225" width="52" height="18" rx="8" fill="#185FA5"/>
  <rect x="588" y="225" width="52" height="18" rx="8" fill="#185FA5"/>

  <rect x="440" y="232" width="28" height="8" rx="4" fill="#042C53"/>
  <circle cx="438" cy="236" r="8" fill="#042C53" stroke="#9FE1CB" stroke-width="2"/>
  <circle cx="438" cy="236" r="4" fill="#9FE1CB"/>
  <!-- Mano derecha -->
  <rect x="636" y="235" width="22" height="10" rx="5" fill="#FDBCB4"/>
  <!-- Tablet/reporte -->

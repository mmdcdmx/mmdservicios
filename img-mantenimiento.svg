  <path d="M518 195 Q560 180 570 160" stroke="#9FE1CB" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M518 195 Q555 200 565 220" stroke="#185FA5" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M518 195 Q550 210 558 235" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Instrumentos en brazo -->
  <rect x="505" y="155" width="8" height="28" rx="4" fill="#0C447C"/>
  <rect x="518" y="158" width="8" height="24" rx="4" fill="#0C447C"/>
  <rect x="531" y="161" width="8" height="22" rx="4" fill="#0C447C"/>
  <!-- Lámpara dental -->
  <path d="M290 200 Q310 180 350 175" stroke="#FFD700" stroke-width="6" fill="none" stroke-linecap="round"/>
  <ellipse cx="355" cy="172" rx="22" ry="14" fill="#FFD700"/>
  <ellipse cx="355" cy="172" rx="16" ry="10" fill="#FFFDE0"/>
  <!-- Rayos de luz -->
  <line x1="345" y1="186" x2="300" y2="230" stroke="#FFD700" stroke-width="2" opacity="0.4"/>
  <line x1="355" y1="186" x2="320" y2="235" stroke="#FFD700" stroke-width="2" opacity="0.4"/>
  <line x1="365" y1="184" x2="340" y2="230" stroke="#FFD700" stroke-width="2" opacity="0.4"/>

  <!-- TÉCNICO (persona) -->
  <!-- Cuerpo técnico -->
  <rect x="530" y="220" width="60" height="130" rx="8" fill="#185FA5"/>
  <!-- Cabeza -->
  <circle cx="560" cy="200" r="30" fill="#FDBCB4"/>

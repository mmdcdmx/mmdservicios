<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <!-- Fondo -->
  <rect width="800" height="460" fill="#F0F6FF" rx="16"/>
  <!-- Sombra suelo -->
  <ellipse cx="400" cy="420" rx="320" ry="18" fill="rgba(0,0,0,0.06)"/>
  
  <!-- Unidad dental - base sillón -->
  <rect x="180" y="280" width="260" height="120" rx="14" fill="#0C447C"/>
  <rect x="190" y="290" width="240" height="100" rx="10" fill="#185FA5"/>

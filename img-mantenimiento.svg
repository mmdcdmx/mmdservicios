  <rect x="185" y="240" width="250" height="60" rx="12" fill="#E6F1FB"/>
  <rect x="190" y="245" width="240" height="50" rx="10" fill="#fff"/>
  <rect x="190" y="245" width="240" height="6" rx="3" fill="#B5D4F4"/>
  <!-- Respaldo sillón -->
  <rect x="370" y="140" width="70" height="110" rx="12" fill="#E6F1FB"/>
  <rect x="375" y="145" width="60" height="100" rx="10" fill="#fff"/>

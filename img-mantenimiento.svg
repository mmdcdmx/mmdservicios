  <rect x="663" y="225" width="26" height="4" rx="2" fill="#185FA5"/>
  <rect x="663" y="233" width="20" height="3" rx="1" fill="#9FE1CB"/>
  <rect x="663" y="240" width="22" height="3" rx="1" fill="#D3D1C7"/>
  <rect x="663" y="247" width="18" height="3" rx="1" fill="#D3D1C7"/>
  <!-- Check en tablet -->
  <path d="M681 251 L684 254 L689 249" stroke="#0F6E56" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Piernas técnico -->
  <rect x="530" y="348" width="26" height="60" rx="8" fill="#042C53"/>
  <rect x="562" y="348" width="26" height="60" rx="8" fill="#042C53"/>
  <!-- Zapatos -->
  <ellipse cx="543" cy="408" rx="18" ry="8" fill="#2C2C2A"/>
  <ellipse cx="575" cy="408" rx="18" ry="8" fill="#2C2C2A"/>

  <!-- Caja de herramientas -->
  <rect x="80" y="350" width="100" height="60" rx="8" fill="#042C53"/>
  <rect x="82" y="352" width="96" height="56" rx="6" fill="#0C447C"/>
  <rect x="115" y="345" width="30" height="10" rx="5" fill="#185FA5"/>
  <!-- Herramientas en caja -->
  <rect x="92" y="368" width="16" height="30" rx="3" fill="#9FE1CB"/>
  <rect x="114" y="362" width="14" height="36" rx="3" fill="#FFD700"/>
  <rect x="134" y="370" width="12" height="28" rx="3" fill="#9FE1CB"/>
  <rect x="152" y="366" width="14" height="32" rx="3" fill="#185FA5"/>

  <!-- Partículas decorativas -->
  <circle cx="140" cy="120" r="6" fill="#9FE1CB" opacity="0.6"/>
  <circle cx="680" cy="100" r="10" fill="#FFD700" opacity="0.4"/>
  <circle cx="720" cy="160" r="5" fill="#185FA5" opacity="0.3"/>
  <circle cx="100" cy="200" r="8" fill="#0F6E56" opacity="0.3"/>
  
  <!-- Texto MMD -->
  <text x="400" y="450" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#5F5E5A" font-weight="600">MMD Servicios · Mantenimiento Preventivo de Unidades Dentales</text>
</svg>
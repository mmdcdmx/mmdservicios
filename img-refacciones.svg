  <text x="695" y="315" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#042C53">6 meses de garantía</text>
  
  <text x="400" y="450" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#5F5E5A" font-weight="600">MMD Servicios · Refacciones Originales y Compatibles para Equipos Dentales</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#E1F5EE" rx="16"/>
  <ellipse cx="400" cy="430" rx="300" ry="14" fill="rgba(0,0,0,0.06)"/>
  
  <!-- Compresor - tanque principal -->
  <ellipse cx="320" cy="300" rx="30" ry="110" fill="#0C447C"/>
  <rect x="190" y="230" width="260" height="140" rx="6" fill="#185FA5"/>
  <ellipse cx="190" cy="300" rx="30" ry="110" fill="#185FA5"/>
  <ellipse cx="450" cy="300" rx="30" ry="110" fill="#0C447C"/>
  <rect x="190" y="228" width="260" height="12" rx="6" fill="#9FE1CB" opacity="0.4"/>
  <!-- Texto OIL FREE -->
  <rect x="240" y="285" width="160" height="30" rx="6" fill="#042C53"/>
  <text x="320" y="305" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#9FE1CB" font-weight="bold">OIL FREE</text>
  <!-- Manómetro -->
  <circle cx="320" cy="248" r="28" fill="#042C53" stroke="#9FE1CB" stroke-width="2"/>
  <circle cx="320" cy="248" r="22" fill="#0a1a2e"/>
  <text x="320" y="244" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9FE1CB">BAR</text>
  <text x="320" y="258" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFD700" font-weight="bold">6.5</text>
  <!-- Aguja manómetro -->
  <line x1="320" y1="248" x2="330" y2="238" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Motor/cabeza compresora -->
  <rect x="480" y="250" width="120" height="100" rx="10" fill="#042C53"/>
  <rect x="488" y="258" width="104" height="84" rx="8" fill="#0C447C"/>
  <!-- Aletas de refrigeración -->
  <rect x="496" y="268" width="88" height="6" rx="2" fill="#185FA5"/>
  <rect x="496" y="280" width="88" height="6" rx="2" fill="#185FA5"/>
  <rect x="496" y="292" width="88" height="6" rx="2" fill="#185FA5"/>
  <rect x="496" y="304" width="88" height="6" rx="2" fill="#185FA5"/>
  <rect x="496" y="316" width="88" height="6" rx="2" fill="#185FA5"/>
  <!-- Indicador LED verde -->
  <circle cx="540" cy="332" r="8" fill="#0F6E56"/>
  <text x="554" y="336" font-family="sans-serif" font-size="9" fill="#fff">EN MARCHA</text>
  
  <!-- Tuberías de aire -->
  <path d="M450 280 Q490 270 490 260" stroke="#9FE1CB" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M450 310 Q490 310 490 290" stroke="#185FA5" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Sistema de filtros -->
  <rect x="100" y="260" width="70" height="120" rx="8" fill="#042C53"/>
  <rect x="106" y="266" width="58" height="108" rx="6" fill="#0C447C"/>
  <!-- Filtros internos -->
  <rect x="114" y="278" width="42" height="18" rx="4" fill="#185FA5"/>
  <rect x="114" y="302" width="42" height="18" rx="4" fill="#0F6E56"/>
  <rect x="114" y="326" width="42" height="18" rx="4" fill="#185FA5"/>
  <rect x="114" y="350" width="42" height="10" rx="4" fill="#FFD700" opacity="0.6"/>
  <!-- Etiquetas filtros -->
  <text x="135" y="292" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">POLVO</text>
  <text x="135" y="316" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">AGUA</text>
  <text x="135" y="340" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">ACEITE</text>
  <!-- Entrada/salida filtros -->
  <rect x="88" y="285" width="18" height="8" rx="4" fill="#9FE1CB"/>
  <rect x="88" y="355" width="18" height="8" rx="4" fill="#0F6E56"/>
  <text x="88" y="280" font-family="sans-serif" font-size="8" fill="#5F5E5A">IN</text>
  <text x="86" y="374" font-family="sans-serif" font-size="8" fill="#5F5E5A">OUT</text>
  
  <!-- Tubo de salida a unidad dental -->
  <path d="M170 355 Q200 355 200 350" stroke="#0F6E56" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M170 290 Q185 290 190 280" stroke="#9FE1CB" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Patas del compresor -->
  <rect x="220" y="380" width="20" height="30" rx="4" fill="#042C53"/>
  <rect x="400" y="380" width="20" height="30" rx="4" fill="#042C53"/>
  <rect x="200" y="405" width="250" height="10" rx="4" fill="#2C2C2A"/>
  
  <!-- Check de calidad de aire -->
  <rect x="570" y="180" width="160" height="90" rx="10" fill="#fff" stroke="#9FE1CB" stroke-width="2"/>
  <rect x="570" y="180" width="160" height="26" rx="10" fill="#0F6E56"/>
  <rect x="570" y="196" width="160" height="10" rx="0" fill="#0F6E56"/>
  <text x="650" y="198" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">CALIDAD DE AIRE</text>
  <text x="584" y="218" font-family="sans-serif" font-size="9" fill="#5F5E5A">Sin aceite: ✓ Conforme</text>
  <text x="584" y="232" font-family="sans-serif" font-size="9" fill="#5F5E5A">Sin humedad: ✓ Conforme</text>
  <text x="584" y="246" font-family="sans-serif" font-size="9" fill="#5F5E5A">Sin bacterias: ✓ Conforme</text>
  <text x="584" y="260" font-family="sans-serif" font-size="9" fill="#0F6E56" font-weight="bold">ISO 8573-1 · Clase 1</text>

  <!-- Burbujas de aire -->
  <circle cx="660" cy="130" r="12" fill="none" stroke="#9FE1CB" stroke-width="2" opacity="0.6"/>
  <circle cx="690" cy="100" r="8" fill="none" stroke="#9FE1CB" stroke-width="2" opacity="0.4"/>
  <circle cx="640" cy="100" r="16" fill="none" stroke="#9FE1CB" stroke-width="2" opacity="0.3"/>
  
  <text x="400" y="450" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#5F5E5A" font-weight="600">MMD Servicios · Mantenimiento de Compresores Dentales Libres de Aceite</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#E0F7FA" rx="16"/>
  <ellipse cx="400" cy="430" rx="300" ry="14" fill="rgba(0,0,0,0.06)"/>
  
  <!-- Unidad dental limpia -->
  <rect x="220" y="200" width="200" height="180" rx="14" fill="#185FA5"/>
  <rect x="228" y="208" width="184" height="164" rx="10" fill="#E6F1FB"/>
  <!-- Sillón limpio -->
  <rect x="222" y="160" width="196" height="50" rx="12" fill="#fff" stroke="#B5D4F4" stroke-width="2"/>
  <rect x="228" y="165" width="184" height="40" rx="8" fill="#fff"/>
  <!-- Brillo/lustre -->
  <path d="M240 170 Q280 158 320 168" stroke="#9FE1CB" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Spray de limpieza -->
  <rect x="100" y="200" width="50" height="90" rx="10" fill="#0F6E56"/>
  <rect x="106" y="206" width="38" height="78" rx="7" fill="#E1F5EE"/>
  <rect x="106" y="230" width="38" height="28" rx="4" fill="#9FE1CB" opacity="0.5"/>
  <rect x="114" y="214" width="22" height="10" rx="4" fill="#0F6E56"/>
  <path d="M136 219 Q155 215 162 220" stroke="#9FE1CB" stroke-width="3" fill="none"/>
  <!-- Gotas del spray -->
  <circle cx="170" cy="218" r="3" fill="#9FE1CB" opacity="0.7"/>
  <circle cx="178" cy="224" r="2" fill="#9FE1CB" opacity="0.5"/>
  <circle cx="168" cy="228" r="2" fill="#9FE1CB" opacity="0.6"/>
  <text x="125" y="302" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0F6E56" font-weight="bold">ISO 70%</text>
  
  <!-- Paño de microfibra -->
  <rect x="150" y="280" width="60" height="50" rx="6" fill="#185FA5"/>
  <rect x="154" y="284" width="52" height="42" rx="4" fill="#E6F1FB"/>
  <!-- Textura paño -->
  <line x1="160" y1="292" x2="200" y2="292" stroke="#B5D4F4" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="300" x2="200" y2="300" stroke="#B5D4F4" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="308" x2="200" y2="308" stroke="#B5D4F4" stroke-width="1" opacity="0.5"/>
  <line x1="168" y1="286" x2="168" y2="322" stroke="#B5D4F4" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="286" x2="180" y2="322" stroke="#B5D4F4" stroke-width="1" opacity="0.5"/>
  <line x1="192" y1="286" x2="192" y2="322" stroke="#B5D4F4" stroke-width="1" opacity="0.5"/>
  
  <!-- Checklist de limpieza -->
  <rect x="470" y="140" width="260" height="240" rx="12" fill="#fff" stroke="#9FE1CB" stroke-width="2"/>
  <rect x="470" y="140" width="260" height="36" rx="12" fill="#0F6E56"/>
  <rect x="470" y="164" width="260" height="12" fill="#0F6E56"/>
  <text x="600" y="163" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">RUTINA DE LIMPIEZA DIARIA</text>
  
  <!-- Items checklist -->
  <rect x="486" y="188" width="16" height="16" rx="3" fill="#0F6E56"/>
  <text x="494" y="200" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">✓</text>
  <text x="512" y="200" font-family="sans-serif" font-size="10" fill="#2C2C2A">Superficies exteriores</text>
  
  <rect x="486" y="210" width="16" height="16" rx="3" fill="#0F6E56"/>
  <text x="494" y="222" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">✓</text>
  <text x="512" y="222" font-family="sans-serif" font-size="10" fill="#2C2C2A">Cabezal y brazos</text>
  
  <rect x="486" y="232" width="16" height="16" rx="3" fill="#0F6E56"/>
  <text x="494" y="244" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">✓</text>
  <text x="512" y="244" font-family="sans-serif" font-size="10" fill="#2C2C2A">Escupidera y drenaje</text>
  
  <rect x="486" y="254" width="16" height="16" rx="3" fill="#0F6E56"/>
  <text x="494" y="266" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">✓</text>
  <text x="512" y="266" font-family="sans-serif" font-size="10" fill="#2C2C2A">Piezas de mano</text>
  
  <rect x="486" y="276" width="16" height="16" rx="3" fill="#0F6E56"/>
  <text x="494" y="288" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff">✓</text>
  <text x="512" y="288" font-family="sans-serif" font-size="10" fill="#2C2C2A">Tapizado del sillón</text>
  
  <rect x="486" y="298" width="16" height="16" rx="3" fill="#FFD700"/>
  <text x="494" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#042C53">~</text>
  <text x="512" y="310" font-family="sans-serif" font-size="10" fill="#5F5E5A">Purga líneas de agua</text>
  
  <rect x="486" y="320" width="16" height="16" rx="3" fill="#FFD700"/>
  <text x="494" y="332" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#042C53">~</text>
  <text x="512" y="332" font-family="sans-serif" font-size="10" fill="#5F5E5A">Filtros de sedimentos</text>
  
  <rect x="476" y="348" width="244" height="28" rx="6" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="1"/>
  <text x="598" y="366" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0F6E56" font-weight="bold">✓ Verde = diario · ~ = Semanal</text>

  <!-- Icono de tiempo -->
  <circle cx="130" cy="110" r="36" fill="#0F6E56"/>
  <circle cx="130" cy="110" r="28" fill="#E1F5EE"/>
  <path d="M130 90 L130 110 L145 120" stroke="#0F6E56" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="130" y="155" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#042C53" font-weight="bold">10 min/día</text>

  <text x="400" y="450" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#5F5E5A" font-weight="600">MMD Servicios · Guía de Limpieza y Cuidado Diario de Equipos Dentales</text>
</svg>
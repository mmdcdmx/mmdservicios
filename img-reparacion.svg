  <text x="362" y="250" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFD700">VAC</text>
  <circle cx="355" cy="269" r="6" fill="#FF4444"/>
  <circle cx="370" cy="269" r="6" fill="#0F6E56"/>
  <!-- Cables del multímetro -->
  <path d="M355 275 Q355 290 340 295" stroke="#FF4444" stroke-width="2" fill="none"/>
  <path d="M370 275 Q375 290 382 248" stroke="#0F6E56" stroke-width="2" fill="none"/>
  <!-- Mano derecha con tablet -->
  <rect x="541" y="244" width="18" height="9" rx="4" fill="#FDBCB4"/>
  <rect x="557" y="220" width="50" height="65" rx="8" fill="#fff" stroke="#185FA5" stroke-width="2"/>
  <rect x="563" y="228" width="38" height="28" rx="3" fill="#F0F6FF"/>
  <!-- Diagnóstico en tablet -->
  <rect x="565" y="231" width="34" height="4" rx="2" fill="#B80000"/>
  <rect x="565" y="238" width="24" height="3" rx="1" fill="#D3D1C7"/>
  <rect x="565" y="244" width="28" height="3" rx="1" fill="#D3D1C7"/>
  <text x="586" y="265" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#B80000">FALLA EN</text>
  <text x="586" y="275" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#B80000">VÁLVULA</text>
  <rect x="563" y="278" width="38" height="14" rx="3" fill="#0F6E56"/>
  <text x="582" y="289" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">REPARABLE ✓</text>
  <!-- Piernas técnico -->
  <rect x="440" y="338" width="22" height="50" rx="6" fill="#042C53"/>
  <rect x="470" y="338" width="22" height="50" rx="6" fill="#042C53"/>
  <ellipse cx="451" cy="388" rx="16" ry="7" fill="#2C2C2A"/>
  <ellipse cx="481" cy="388" rx="16" ry="7" fill="#2C2C2A"/>

  <!-- Proceso de reparación - pasos -->
  <rect x="600" y="160" width="160" height="170" rx="10" fill="#fff" stroke="#9FE1CB" stroke-width="2"/>
  <rect x="600" y="160" width="160" height="28" rx="10" fill="#0F6E56"/>
  <rect x="600" y="176" width="160" height="12" fill="#0F6E56"/>
  <text x="680" y="179" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">PROCESO MMD</text>
  <text x="614" y="202" font-family="sans-serif" font-size="10" fill="#0F6E56" font-weight="bold">1. Diagnóstico</text>
  <text x="614" y="215" font-family="sans-serif" font-size="9" fill="#5F5E5A">Identificar causa raíz</text>
  <text x="614" y="232" font-family="sans-serif" font-size="10" fill="#0F6E56" font-weight="bold">2. Presupuesto</text>
  <text x="614" y="245" font-family="sans-serif" font-size="9" fill="#5F5E5A">Sin sorpresas de costo</text>
  <text x="614" y="262" font-family="sans-serif" font-size="10" fill="#0F6E56" font-weight="bold">3. Reparación</text>
  <text x="614" y="275" font-family="sans-serif" font-size="9" fill="#5F5E5A">Refacciones de calidad</text>
  <text x="614" y="292" font-family="sans-serif" font-size="10" fill="#0F6E56" font-weight="bold">4. Prueba</text>
  <text x="614" y="305" font-family="sans-serif" font-size="9" fill="#5F5E5A">Verificación completa</text>
  <rect x="610" y="315" width="140" height="16" rx="4" fill="#0F6E56"/>
  <text x="680" y="327" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff" font-weight="bold">Garantía 6 meses en refacciones</text>

  <text x="400" y="450" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#5F5E5A" font-weight="600">MMD Servicios · Diagnóstico y Reparación de Unidades Dentales</text>
</svg>
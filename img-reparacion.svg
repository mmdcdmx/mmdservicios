  <rect x="250" y="308" width="60" height="22" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="280" y="323" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#042C53">MANGUERA 6mm</text>
  
  <!-- Técnico analizando (brazo derecho) -->
  <!-- Cuerpo técnico -->
  <rect x="440" y="230" width="55" height="110" rx="8" fill="#185FA5"/>
  <circle cx="467" cy="210" r="26" fill="#FDBCB4"/>
  <ellipse cx="467" cy="195" rx="28" ry="12" fill="#FFD700"/>
  <rect x="440" y="194" width="55" height="7" rx="3" fill="#E6B800"/>
  <!-- Gafas de trabajo -->
  <rect x="453" y="204" width="12" height="8" rx="3" fill="none" stroke="#042C53" stroke-width="2"/>
  <rect x="467" y="204" width="12" height="8" rx="3" fill="none" stroke="#042C53" stroke-width="2"/>
  <line x1="465" y1="208" x2="467" y2="208" stroke="#042C53" stroke-width="1.5"/>
  <!-- Brazos técnico -->
  <rect x="392" y="235" width="50" height="16" rx="7" fill="#185FA5"/>
  <rect x="493" y="235" width="50" height="16" rx="7" fill="#185FA5"/>
  <!-- Mano izquierda con multímetro -->
  <rect x="378" y="244" width="18" height="9" rx="4" fill="#FDBCB4"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#FFF3E0" rx="16"/>
  <ellipse cx="400" cy="430" rx="300" ry="14" fill="rgba(0,0,0,0.06)"/>
  
  <!-- Mesa de trabajo -->
  <rect x="80" y="340" width="640" height="16" rx="6" fill="#D3D1C7"/>
  <rect x="100" y="354" width="20" height="60" rx="4" fill="#D3D1C7"/>
  <rect x="680" y="354" width="20" height="60" rx="4" fill="#D3D1C7"/>
  
  <!-- Unidad dental en mesa (necesita reparación) -->
